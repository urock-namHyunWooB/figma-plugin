<style>
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 16px;
    margin: 0;
  }

  h2 {
    margin-top: 0;
    font-size: 18px;
    font-weight: 600;
  }

  #selection-list {
    margin: 16px 0;
    max-height: 400px;
    overflow-y: auto;
  }

  .layer-item {
    background: #f5f5f5;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }

  .layer-name {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
  }

  .layer-info {
    font-size: 12px;
    color: #666;
    margin: 4px 0;
    line-height: 1.5;
  }

  .layer-info strong {
    color: #333;
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    color: #999;
    padding: 32px;
  }

  button {
    width: 100%;
    padding: 8px;
    background: #18a0fb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
  }

  button:hover {
    background: #0d8de4;
  }

  .variant-select {
    padding: 4px 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    background: white;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  .variant-select:hover {
    border-color: #18a0fb;
  }

  .variant-select:focus {
    border-color: #18a0fb;
    box-shadow: 0 0 0 2px rgba(24, 160, 251, 0.2);
  }
</style>

<h2>선택된 레이어 정보</h2>

<!-- 메타데이터 설정 섹션 -->
<div id="metadata-section" style="display: none;">
  <div style="background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin-bottom: 16px;">
    <div style="font-weight: 600; font-size: 14px; margin-bottom: 8px;">🏷️ 메타데이터 설정</div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 12px; color: #666;">타입:</label>
      <select id="metadata-type" class="variant-select" style="flex: 1;">
        <option value="">선택 안 함</option>
        <option value="slot">Slot</option>
        <option value="default">Default</option>
      </select>
    </div>
  </div>
</div>

<div id="selection-list">
  <div class="empty-state">레이어를 선택해주세요</div>
</div>
<button id="cancel">닫기</button>

<script>
  document.getElementById('cancel').onclick = () => {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*')
  }

  let currentNodeId = null;

  // 메타데이터 select box 이벤트 핸들러
  document.getElementById('metadata-type').addEventListener('change', (e) => {
    if (!currentNodeId) return;

    const metadataType = e.target.value;
    parent.postMessage({
      pluginMessage: {
        type: 'set-metadata',
        nodeId: currentNodeId,
        metadataType: metadataType
      }
    }, '*');
  });

  // 플러그인으로부터 메시지 수신
  onmessage = (event) => {
    const msg = event.data.pluginMessage;

    if (msg.type === 'selection-info') {
      displaySelection(msg.data);
    }
  }

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(x => {
      const hex = x.toString(16);
      return hex.length === 1 ? '0' + hex : hex;
    }).join('');
  }

  function formatValue(key, value) {
    if (value === undefined || value === null) return '';

    // 색상 정보 표시
    if (key === 'fills' || key === 'strokes') {
      return value.map(item => {
        if (item.type === 'SOLID' && item.color) {
          const hex = rgbToHex(item.color.r, item.color.g, item.color.b);
          const opacity = item.opacity !== undefined ? ` (${Math.round(item.opacity * 100)}%)` : '';
          return `<span style="display: inline-flex; align-items: center; gap: 6px;">
            <span style="width: 16px; height: 16px; border-radius: 3px; background: ${hex}; border: 1px solid #ddd;"></span>
            ${hex}${opacity}
          </span>`;
        }
        return item.type;
      }).join(', ');
    }

    // 텍스트 내용
    if (key === 'characters') {
      return `"${value}"`;
    }

    // 폰트 정보
    if (key === 'fontName') {
      return `${value.family} ${value.style}`;
    }

    // 폰트 크기
    if (key === 'fontSize') {
      if (typeof value === 'number') {
        return `${value}px`;
      }
      return 'Mixed';
    }

    // 배열이나 객체
    if (typeof value === 'object') {
      return JSON.stringify(value, null, 2);
    }

    // 불리언
    if (typeof value === 'boolean') {
      return value ? '예' : '아니오';
    }

    return value;
  }

  function displaySelection(data) {
    const container = document.getElementById('selection-list');
    const metadataSection = document.getElementById('metadata-section');
    const metadataSelect = document.getElementById('metadata-type');

    if (data.length === 0) {
      container.innerHTML = '<div class="empty-state">레이어를 선택해주세요</div>';
      metadataSection.style.display = 'none';
      currentNodeId = null;
      return;
    }

    // 단일 선택 시 메타데이터 섹션 표시
    if (data.length === 1) {
      metadataSection.style.display = 'block';
      currentNodeId = data[0].id;
      metadataSelect.value = data[0].metadataType || '';
    } else {
      metadataSection.style.display = 'none';
      currentNodeId = null;
    }

    container.innerHTML = data.map(layer => {
      const properties = [];

      // 기본 정보
      properties.push({ label: '타입', value: layer.type });
      properties.push({ label: 'ID', value: layer.id });

      // 메타데이터 정보
      if (layer.metadataType) {
        const metadataLabel = layer.metadataType === 'slot' ? 'Slot' : 'Default';
        properties.push({
          label: '메타데이터',
          value: `<span style="background: #18a0fb; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px;">${metadataLabel}</span>`,
          isHtml: true
        });
      }

      // 위치와 크기
      if (layer.x !== undefined) {
        properties.push({ label: '위치', value: `(${layer.x}, ${layer.y})` });
      }
      if (layer.width !== undefined) {
        properties.push({ label: '크기', value: `${layer.width} × ${layer.height}` });
      }

      // 회전
      if (layer.rotation !== undefined) {
        properties.push({ label: '회전', value: `${layer.rotation}°` });
      }

      // 투명도
      if (layer.opacity !== undefined) {
        properties.push({ label: '투명도', value: `${Math.round(layer.opacity * 100)}%` });
      }

      // 표시 여부
      if (!layer.visible) {
        properties.push({ label: '표시', value: '숨김' });
      }

      // 잠금 여부
      if (layer.locked) {
        properties.push({ label: '잠금', value: '예' });
      }

      // Fill (색상)
      if (layer.fills && layer.fills.length > 0) {
        properties.push({ label: 'Fill', value: formatValue('fills', layer.fills), isHtml: true });
      }

      // Stroke (테두리)
      if (layer.strokes && layer.strokes.length > 0) {
        properties.push({ label: 'Stroke', value: formatValue('strokes', layer.strokes), isHtml: true });
      }

      // Stroke 두께
      if (layer.strokeWeight !== undefined) {
        properties.push({ label: 'Stroke 두께', value: `${layer.strokeWeight}px` });
      }

      // Corner Radius
      if (layer.cornerRadius !== undefined) {
        properties.push({ label: 'Corner Radius', value: `${layer.cornerRadius}px` });
      }

      // 텍스트 관련
      if (layer.characters !== undefined) {
        properties.push({ label: '텍스트', value: formatValue('characters', layer.characters) });
      }
      if (layer.fontSize !== undefined) {
        properties.push({ label: '폰트 크기', value: formatValue('fontSize', layer.fontSize) });
      }
      if (layer.fontName !== undefined) {
        properties.push({ label: '폰트', value: formatValue('fontName', layer.fontName) });
      }
      if (layer.textAlignHorizontal !== undefined) {
        properties.push({ label: '텍스트 정렬', value: layer.textAlignHorizontal });
      }

      // Auto Layout
      if (layer.layoutMode !== undefined) {
        properties.push({ label: 'Layout Mode', value: layer.layoutMode });
        properties.push({ label: 'Item Spacing', value: `${layer.itemSpacing}px` });
        properties.push({ label: 'Padding', value: `${layer.paddingTop} ${layer.paddingRight} ${layer.paddingBottom} ${layer.paddingLeft}` });
      }

      // 자식 개수
      if (layer.childrenCount !== undefined) {
        properties.push({ label: '자식 개수', value: layer.childrenCount });
      }

      // Component Instance 정보
      if (layer.isInstance) {
        console.log('Instance detected:', layer.name);
        console.log('Component Properties:', layer.componentProperties);
        console.log('Available Variants:', layer.availableVariants);

        properties.push({ label: 'Component', value: layer.mainComponentName || 'Unknown' });

        if (layer.componentSetName) {
          properties.push({ label: 'Component Set', value: layer.componentSetName });
        }

        // Variant Properties (변경 가능)
        if (layer.componentProperties && layer.availableVariants) {
          Object.entries(layer.componentProperties).forEach(([propName, propValue]) => {
            console.log(`Checking property: ${propName}`, propValue);

            if (propValue.type === 'VARIANT') {
              const currentValue = propValue.value;
              const availableOptions = layer.availableVariants[propName] || [];

              console.log(`Creating dropdown for ${propName}:`, availableOptions);

              // 드롭다운 생성
              const selectId = `variant-${layer.id}-${propName}`;
              const selectHtml = `
                <select id="${selectId}" class="variant-select" data-node-id="${layer.id}" data-property="${propName}">
                  ${availableOptions.map(option => `
                    <option value="${option}" ${option === currentValue ? 'selected' : ''}>${option}</option>
                  `).join('')}
                </select>
              `;

              properties.push({
                label: `Variant: ${propName}`,
                value: selectHtml,
                isHtml: true
              });
            }
          });
        } else {
          console.log('Missing data for dropdown:', {
            hasComponentProperties: !!layer.componentProperties,
            hasAvailableVariants: !!layer.availableVariants
          });
        }
      }

      // Effects
      if (layer.effects && layer.effects.length > 0) {
        properties.push({ label: 'Effects', value: layer.effects.map(e => e.type).join(', ') });
      }

      // Blend Mode
      if (layer.blendMode !== undefined) {
        properties.push({ label: 'Blend Mode', value: layer.blendMode });
      }

      const propertiesHtml = properties.map(prop => {
        if (prop.isHtml) {
          return `<div class="layer-info"><strong>${prop.label}:</strong> ${prop.value}</div>`;
        }
        return `<div class="layer-info"><strong>${prop.label}:</strong> ${prop.value}</div>`;
      }).join('');

      return `
        <div class="layer-item">
          <div class="layer-name">${layer.name}</div>
          ${propertiesHtml}
        </div>
      `;
    }).join('');

    // Variant 드롭다운 이벤트 리스너 추가
    setTimeout(() => {
      const selects = document.querySelectorAll('.variant-select');
      selects.forEach(select => {
        select.addEventListener('change', (e) => {
          const target = e.target;
          const nodeId = target.getAttribute('data-node-id');
          const propertyName = target.getAttribute('data-property');
          const value = target.value;

          parent.postMessage({
            pluginMessage: {
              type: 'change-variant',
              nodeId: nodeId,
              propertyName: propertyName,
              value: value
            }
          }, '*');
        });
      });
    }, 0);
  }
</script>
