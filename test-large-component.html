<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Large Component Test</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .test-container {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .test-title {
      font-weight: 600;
      margin-bottom: 12px;
      color: #1a1a1a;
    }
    .test-result {
      padding: 12px;
      border-radius: 4px;
      margin-top: 8px;
      font-size: 14px;
    }
    .pass {
      background: #d1fae5;
      color: #065f46;
    }
    .fail {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <h1>Large Component Browser Test</h1>
  
  <div class="test-container">
    <div class="test-title">Test 1: Primary color button (disabled=false)</div>
    <div id="test1-preview"></div>
    <div id="test1-result" class="test-result"></div>
  </div>
  
  <div class="test-container">
    <div class="test-title">Test 2: Primary button (disabled=true)</div>
    <div id="test2-preview"></div>
    <div id="test2-result" class="test-result"></div>
  </div>
  
  <div class="test-container">
    <div class="test-title">Test 3: Light button (disabled=true)</div>
    <div id="test3-preview"></div>
    <div id="test3-result" class="test-result"></div>
  </div>

  <script type="module">
    import { css } from 'https://esm.sh/@emotion/react@11.11.3';
    import React from 'https://esm.sh/react@19.0.0';
    import ReactDOM from 'https://esm.sh/react-dom@19.0.0/client';
    
    // Large.json의 컴파일 결과 패턴을 재현
    const AColorStyles = {
      Primary: { color: 'rgb(255, 255, 255)' },
      Light: { color: 'rgb(0, 0, 0)' },
    };

    const ACss = ($color, $customDisabled) => css`
      font-size: 16px;
      padding: 12px 24px;
      border-radius: 8px;
      background: ${$color === 'Primary' ? '#0050FF' : '#F0F0F0'};
      ${AColorStyles[$color]}
      ${$customDisabled ? { color: '#B2B2B2' } : {}}
    `;

    const TestButton = ({ color, customDisabled, label }) => {
      return React.createElement('button', {
        css: ACss(color, customDisabled),
        'data-testid': `btn-${color}-${customDisabled}`,
      }, label);
    };

    function runTest(testId, color, disabled, expectedColor) {
      const container = document.getElementById(`test${testId}-preview`);
      const resultDiv = document.getElementById(`test${testId}-result`);
      
      const root = ReactDOM.createRoot(container);
      root.render(React.createElement(TestButton, {
        color,
        customDisabled: disabled,
        label: `${color} Button (disabled=${disabled})`
      }));

      setTimeout(() => {
        const button = container.querySelector('button');
        const computedStyle = window.getComputedStyle(button);
        const actualColor = computedStyle.color;
        
        const passed = actualColor === expectedColor;
        resultDiv.className = `test-result ${passed ? 'pass' : 'fail'}`;
        resultDiv.textContent = passed 
          ? `✓ PASS: Expected ${expectedColor}, got ${actualColor}`
          : `✗ FAIL: Expected ${expectedColor}, got ${actualColor}`;
      }, 100);
    }

    // Run tests
    runTest(1, 'Primary', false, 'rgb(255, 255, 255)'); // white
    runTest(2, 'Primary', true, 'rgb(178, 178, 178)'); // gray
    runTest(3, 'Light', true, 'rgb(178, 178, 178)'); // gray
  </script>
</body>
</html>
