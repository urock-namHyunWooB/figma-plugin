<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Large Component Test</title>
  <script type="module" src="/@vite/client"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    .test-section {
      background: white;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .test-title {
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a1a1a;
      font-size: 16px;
    }
    .test-preview {
      padding: 20px;
      background: #fafafa;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .test-result {
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      font-family: 'Monaco', 'Courier New', monospace;
    }
    .pass {
      background: #d1fae5;
      color: #065f46;
    }
    .fail {
      background: #fee2e2;
      color: #991b1b;
    }
  </style>
</head>
<body>
  <h1>Large Component Browser Validation</h1>
  <div id="root"></div>
  <script type="module" src="/test-large-script.tsx"></script>
</body>
</html>
