<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Large Component Test</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    .test-box {
      background: white;
      padding: 24px;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    .result {
      padding: 12px;
      margin-top: 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 14px;
    }
    .pass { background: #d1fae5; color: #065f46; }
    .fail { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h1>Large Component Browser Validation</h1>
  
  <div class="test-box">
    <h3>Test 1: Primary + disabled=false</h3>
    <button id="test1" style="
      padding: 18px 16px;
      border-radius: 8px;
      background: #0050FF;
      color: #FFF;
      font-size: 16px;
      font-weight: 700;
      border: none;
    ">Primary Button</button>
    <div id="result1" class="result">Measuring...</div>
  </div>

  <div class="test-box">
    <h3>Test 2: Primary + disabled=true (CURRENT BUG)</h3>
    <button id="test2" disabled style="
      padding: 18px 16px;
      border-radius: 8px;
      background: #CCE2FF;
      color: #FFF;
      font-size: 16px;
      font-weight: 700;
      border: none;
    ">Primary Disabled (stays white - BUG)</button>
    <div id="result2" class="result">Measuring...</div>
  </div>

  <div class="test-box">
    <h3>Test 3: Light + disabled=true</h3>
    <button id="test3" disabled style="
      padding: 18px 16px;
      border-radius: 8px;
      background: #EDEFF2;
      color: #B2B2B2;
      font-size: 16px;
      font-weight: 700;
      border: none;
    ">Light Disabled (gray - CORRECT)</button>
    <div id="result3" class="result">Measuring...</div>
  </div>

  <script>
    function runTest(btnId, resultId, expectedColor, description) {
      const btn = document.getElementById(btnId);
      const result = document.getElementById(resultId);
      const actualColor = window.getComputedStyle(btn).color;
      const passed = actualColor === expectedColor;
      
      result.className = passed ? 'result pass' : 'result fail';
      result.textContent = `${passed ? '✓ PASS' : '✗ FAIL'}: ${description}\nExpected: ${expectedColor}\nActual: ${actualColor}`;
    }

    setTimeout(() => {
      runTest('test1', 'result1', 'rgb(255, 255, 255)', 'Primary disabled=false should be white');
      runTest('test2', 'result2', 'rgb(255, 255, 255)', 'Primary disabled=true should stay white');
      runTest('test3', 'result3', 'rgb(178, 178, 178)', 'Light disabled=true should be gray');
    }, 100);
  </script>
</body>
</html>
